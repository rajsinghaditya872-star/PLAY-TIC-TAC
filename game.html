<html
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7928ca">

    <link rel="stylesheet" href="style.css">
    <div class="popup" id="popup">

    <div class="popup-content">

        <h2 id="popupTitle"></h2>

        <p id="popupText"></p>

        <button onclick="closePopup()">
            🎮 Play Again
        </button>

    </div>

</div>
    <script src="script.js" defer></script>
</head>

<body>

<h1 class="title">
    🎮 Tic Tac Toe ✨
</h1>

<div class="status" id="status">
    Player ❌ Turn
</div>

<div class="top-controls">

    <select id="gameMode">
        <option value="multi">👥 Multiplayer</option>
        <option value="easy">🤖 Easy AI</option>
        <option value="medium">🧠 Medium AI</option>
        <option value="impossible">💀 Impossible AI</option>
    </select>

    <select id="themeSelector">
        <option value="neon">🌈 Neon</option>
        <option value="dark">🌙 Dark</option>
        <option value="light">☀️ Light</option>
    </select>

    <button id="installBtn">
        📲 Install
    </button>

</div>

<div class="scoreboard">

    <div>❌ <span id="xScore">0</span></div>

    <div>🤝 <span id="drawScore">0</span></div>

    <div>⭕ <span id="oScore">0</span></div>

</div>

<div class="board">

    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>

    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>

    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>

</div>

<div class="controls">
    <button onclick="restartGame()" class="restart-btn">
        🔄 Restart Game
    </button>
</div>

</body>
</html>
